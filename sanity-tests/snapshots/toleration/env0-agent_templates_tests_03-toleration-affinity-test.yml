---
# Source: env0-agent/templates/tests/03-toleration-affinity-test.yml
apiVersion: v1
kind: Pod
metadata:
  name: &name "agent-toleration-affinity-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  
  
  containers:
    - name: *name
      image: ghcr.io/env0/deployment-agent:dev
      imagePullPolicy: Always
      
      
      command:
        - /bin/bash
        - -ec
        - |
          echo "✅💾 Pod scheduled successfully with provided toleration/affinity setting!"


  
  # Warning - every whitespace here matters
  tolerations: 
    -
      effect: NoSchedule
      key: key1
      operator: Equal
      value: value1
    
    -
      effect: NoExecute
      key: key2
      operator: Exists
