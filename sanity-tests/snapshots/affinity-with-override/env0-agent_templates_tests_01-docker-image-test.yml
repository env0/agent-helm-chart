---
# Source: env0-agent/templates/tests/01-docker-image-test.yml
apiVersion: v1
kind: Pod
metadata:
  name: &name "agent-docker-image-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  
  
  containers:
    - name: *name
      image: ghcr.io/env0/deployment-agent:dev
      imagePullPolicy: Always
      
      
      command:
        - /bin/bash
        - -ec
        - |
          echo "Mounted image ghcr.io/env0/deployment-agent:dev. Testing..."
          
          echo -n "Agent Proxy entry point... "
          [ -f run-proxy.js ] && echo "OK." || (echo "FAILED." && false)
          
          echo -n "Agent Trigger entry point... "
          [ -f run-agent-trigger.js ] && echo "OK." || (echo "FAILED." && false)
          
          echo -n "Agent Deployment Job entry point... "
          [ -f main.js ] && echo "OK." || (echo "FAILED." && false)
          
          echo "✅🐳 env0 Docker image mounted successfully!"
